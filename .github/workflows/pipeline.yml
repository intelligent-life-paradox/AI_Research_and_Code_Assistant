name: Diffusion Models AI Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install arxiv gitpython llama-index llama-index-vector-stores-chroma chromadb

      - name: Ingest and Index Knowledge
        run: python rag/pipeline_manager.py --mode all

      - name: Run CrewAI Agent
        env:
          USER_INPUT: "Explain the forward diffusion process in DDPM"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MODEL_MANAGER: ${{ secrets.MODEL_MANAGER }}
          MODEL_EXPLAINER: ${{ secrets.MODEL_EXPLAINER }}
          MODEL_CODER: ${{ secrets.MODEL_CODER }}
          MAX_TOKENS_EXPLAINER: ${{ secrets.MAX_TOKENS_EXPLAINER }}
          MAX_TOKENS_CODER: ${{ secrets.MAX_TOKENS_CODER }}
        run: cd crew_diffusion/src && python -m crew_diffusion.main

  docker-build-check:
    runs-on: ubuntu-latest
    needs: pipeline
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build . --file Dockerfile --tag diff-crew-app:latest